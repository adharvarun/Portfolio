<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .tech-stack {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            justify-items: center;
        }
        .tech-item {
            position: relative;
            display: inline-block;
        }
        .tech-icon {
            width: 50px;
            height: 50px;
            transition: transform 0.2s ease;
        }
        .tech-icon:hover {
            transform: scale(1.1);
        }
        .tech-item::after {
            content: attr(title);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 5px;
            border-radius: 3px;
            font-size: 12px;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease, visibility 0s 0.2s;
            z-index: 10;
        }
        .tech-item:hover::after {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>
