<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 30px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .link-list {
            list-style-type: none;
            padding: 0;
        }

        .link-list li {
            margin: 15px 0;
        }

        .link-list a {
            text-decoration: none;
            font-size: 18px;
            color: #0073e6;
            transition: color 0.3s ease;
        }

        .link-list a:hover {
            color: #005bb5;
        }

        .link-list a:visited {
            color: #5c5c5c;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">My Links</div>
        <ul class="link-list">
            <li><a href="https://linkedin.com/in/adharv-arun" target="_blank">LinkedIn</a></li>
            <li><a href="https://github.com/adharvarun" target="_blank">GitHub</a></li>
            <li><a href="https://drive.google.com/drive/folders/1PBvMUd6bNHxwfAWB2fMoPu8P_zQBtTS3?usp=sharing" target="_blank">Certificates</a></li>
            <li><a href="https://www.credly.com/users/adharv-arun/" target="_blank">Credly</a></li>
            <li><a href="https://developers.google.com/profile/u/adharvarun" target="_blank">Google Developer Profile</a></li>
            <li><a href="https://www.cloudskillsboost.google/public_profiles/3d1b4c4a-b28f-40be-a8bd-05ff42ac08f1" target="_blank">Google Cloud Skills Boost Profile</a></li>
        </ul>
    </div>
</body>
</html>
