<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1504610926078-a1611febcad3?q=80&w=1780&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            background-attachment: fixed;
        }

        .container {
            text-align: center;
            padding: 40px;
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            width: 360px;
            height: 80vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .header {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #fff;
        }

        .link-list {
            list-style-type: none;
            padding: 0;
        }

        .link-list li {
            margin: 20px 0;
        }

        .link-list a {
            text-decoration: none;
            font-size: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .link-list a i {
            margin-right: 12px;
            font-size: 26px;
        }

        .link-list a:hover {
            background-color: #0073e6;
            color: #fff;
        }

        .link-list a:visited {
            color: #5c5c5c;
        }

        .link-list a:hover i {
            color: #fff;
        }

        .container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .container::-webkit-scrollbar-thumb {
            background-color: #0073e6;
            border-radius: 10px;
        }

        .container::-webkit-scrollbar-track {
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .container::-webkit-scrollbar-button {
            display: none;
        }

        .container {
            scrollbar-width: thin;
            scrollbar-color: #0073e6 rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://avatars.githubusercontent.com/u/157614579?v=4" alt="Your Profile Picture" class="profile-img">

        <div class="header">My Links</div>
        <ul class="link-list">
            <li><a href="https://linkedin.com/in/adharv-arun" target="_blank"><i class="fab fa-linkedin"></i>LinkedIn</a></li>
            <li><a href="https://github.com/adharvarun" target="_blank"><i class="fab fa-github"></i>GitHub</a></li>
            <li><a href="https://drive.google.com/drive/folders/1PBvMUd6bNHxwfAWB2fMoPu8P_zQBtTS3?usp=sharing" target="_blank"><i class="fas fa-folder-open"></i>Certificates</a></li>
            <li><a href="https://www.credly.com/users/adharv-arun/" target="_blank"><i class="fas fa-certificate"></i>Credly</a></li>
            <li><a href="https://developers.google.com/profile/u/adharvarun" target="_blank"><i class="fab fa-google"></i>Google Developer Profile</a></li>
            <li><a href="https://www.cloudskillsboost.google/public_profiles/3d1b4c4a-b28f-40be-a8bd-05ff42ac08f1" target="_blank"><i class="fas fa-cloud"></i>Google Cloud Skills Boost</a></li>
            <li><a href="https://gitlab.com/adharvarun" target="_blank"><i class="fab fa-gitlab"></i>GitLab</a></li>
            <li><a href="https://leetcode.com/u/Rptor2222/" target="_blank"><i class="fas fa-code"></i>LeetCode</a></li>
        </ul>
    </div>

</body>
</html>
