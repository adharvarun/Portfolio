<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop</title>
    <link rel="stylesheet" href="../fonts.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("wallpaper.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .taskbar {
            position: absolute;
            height: 40px;
            width: 100%;
            background-color: blue;
            bottom: 0;
            z-index: 10;
        }

        .startbtn {
            background-color: green;
            height: 40px;
            width: 100px;
            border: 1px green solid;
            font-family: Tahoma;
            font-weight: bolder;
            color: white;
            border-radius: 0 20px 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .starticon {
            width: 30px;
            height: 24.68px;
        }

        .startmenu {
            position: fixed;
            background-color: white;
            width: 400px;
            height: 500px;
            bottom: 40px;
            left: 0;
            display: none;
            z-index: 15;
        }

        .name {
            font-family: Tahoma;
            font-weight: bolder;
            color: white;
            background-color: blue;
            padding-left: 10px;
            margin: 0;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .apps {
            padding: 10px;
            font-family: Tahoma;
        }

        .app {
            display: flex;
            align-items: center;
        }

        .app:hover {
            background-color: lightgray;
            cursor: pointer;
        }

        .appicon {
            width: 40px;
            height: 40px;
            padding-right: 5px;
        }

        .timediv {
            background-color: rgb(95, 175, 225);
            height: 40px;
            width: 100px;
            font-family: Tahoma;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 0;
            padding-left: 0;
            position: absolute;
            right: 0;
            top: 0;
            cursor: default;
        }

        .window {
            position: absolute;
            width: 500px;
            height: 400px;
            background-color: white;
            border: 1px solid black;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            z-index: 5;
            display: none;
            resize: both;
            overflow: hidden;
        }

        .window .header {
            background-color: #0078d4;
            color: white;
            padding: 10px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window .content {  
            padding: 0;
            overflow: auto;
            height: calc(100% - 40px);
            width: 100%;
            overflow-x: hidden;
        }

        .window .btns {
            display: flex;
            gap: 5px;
        }

        .window .btn {
            width: 20px;
            height: 20px;
            background-image: url('./close.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            color: white;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 0;
        }

        .window .btn:hover {
            background-color: #005a9c;
        }

        .taskbar .task-item {
            display: inline-block;
            padding: 10px;
            color: white;
            cursor: pointer;
            text-align: center;
            border-radius: 5px;
            margin-left: 10px;
        }

        .taskbar .task-item:hover {
            background-color: #005a9c;
        }
    </style>
</head>
<body>
    <div class="taskbar">
        <button class="startbtn"><img src="./starticon.png" class="starticon" /><i>start</i></button>    
        <div class="timediv">
            <p class="time">Time</p>
        </div>
        <div class="task-items"></div>
    </div>

    <div class="startmenu">
        <h3 class="name">Name</h3>
        <div class="apps">
            <div class="app" id="notepad">
                <img src="./apps/Notepad.png" class="appicon" />
                <p>Notepad</p>
            </div>
            <div class="app" id="languages">
                <img src="./apps/Languages.png" class="appicon" />
                <p>Languages and Tools</p>
            </div>
            <div class="app" id="links">
                <img src="./apps/Links.png" class="appicon" />
                <p>Links</p>
            </div>
            <div class="app" id="projects">
                <img src="./apps/Projects.png" class="appicon" />
                <p>Projects</p>
            </div>
            <div class="app" id="contact">
                <img src="./apps/Email.png" class="appicon" />
                <p>Contact Me</p>
            </div>
            <div class="app" id="resume">
                <img src="./apps/Resume.png" class="appicon" />
                <p>Resume</p>
            </div>
        </div>
    </div>

    <script>
        let start = false;

        document.querySelector(".name").innerHTML = window.name


        function updateTime() {
            document.querySelector(".time").innerHTML = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', hour12: true});
        }

        const windowConfig = {
            '#notepad': './apps/monaco.html',
            '#languages': './apps/languages.html',
            '#links': './apps/links.html',
            '#projects': './apps/projects.html',
            '#contact': './apps/contact.html',
            '#resume': './apps/resume.html'
        };

        function createWindow(elementId, iframeSrc) {
            const window = document.createElement('div');
            window.classList.add('window');
            window.innerHTML = `
                <div class="header">
                    <span>${elementId.replace('#', '')}</span>
                    <div class="btns">
                        <button class="btn close-btn"> </button>
                    </div>
                </div>
                <div class="content">
                    <iframe src="${iframeSrc}" width="100%" height="100%"></iframe>
                </div>
            `;
            document.body.appendChild(window);
            centerWindow(window);
            window.style.display = 'block';
            window.style.width = '1100px';
            window.style.height = '550px';

            const closeButton = window.querySelector('.close-btn');
            closeButton.addEventListener('click', function () {
                window.style.display = 'none';
            });

            makeDraggable(window);
            document.querySelector('.startmenu').style.display = 'none';
            start = false;
        }

        document.addEventListener('DOMContentLoaded', function() {
            for (const [elementId, iframeSrc] of Object.entries(windowConfig)) {
                document.querySelector(elementId).addEventListener('click', function() {
                    createWindow(elementId, iframeSrc);
                });
            }
        });

        setInterval(updateTime, 1000);
        updateTime();

        if (!start) {
            document.querySelector('.startmenu').style.display = 'none';
        }

        document.querySelector('.startbtn').addEventListener('click', function () {
            start = !start;
            if (start) {
                document.querySelector('.startmenu').style.display = 'block';
            } else {
                document.querySelector('.startmenu').style.display = 'none';
            }
        });

        function centerWindow(window) {
            const windowWidth = window.offsetWidth;
            const windowHeight = window.offsetHeight;
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            const left = (screenWidth - windowWidth) / 2;
            const top = (screenHeight - windowHeight) / 2;

            window.style.left = left + 'px';
            window.style.top = top + 'px';
        }

        function makeDraggable(windowElement) {
            const header = windowElement.querySelector('.header');
            let isDragging = false;
            let offsetX, offsetY;

            header.addEventListener('mousedown', function(e) {
                isDragging = true;
                offsetX = e.clientX - windowElement.offsetLeft;
                offsetY = e.clientY - windowElement.offsetTop;
                document.addEventListener('mousemove', dragWindow);
                document.addEventListener('mouseup', stopDragging);
            });

            function dragWindow(e) {
                if (isDragging) {
                    windowElement.style.left = (e.clientX - offsetX) + 'px';
                    windowElement.style.top = (e.clientY - offsetY) + 'px';
                }
            }

            function stopDragging() {
                isDragging = false;
                document.removeEventListener('mousemove', dragWindow);
                document.removeEventListener('mouseup', stopDragging);
            }
        }

        window.onload = function() {
            const introWindow = document.createElement('div');
            introWindow.classList.add('window');
            introWindow.innerHTML = `
                <div class="header">
                    <span>Portfolio</span>
                    <div class="btns">
                        <button class="btn close-btn"> </button>
                    </div>
                </div>
                <div class="content">
                    <iframe src="intro.html" width="100%" height="100%"></iframe>
                </div>
            `;
            document.body.appendChild(introWindow);
            centerWindow(introWindow);
            introWindow.style.display = 'block';
            introWindow.style.width = "899px";
            introWindow.style.height = "611px";

            const closeButton = introWindow.querySelector('.close-btn');
            closeButton.addEventListener('click', function () {
                introWindow.style.display = 'none';
            });

            makeDraggable(introWindow);
        };
    </script>
</body>
</html>
