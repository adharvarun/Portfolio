<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #111, #333);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
            flex-direction: column;
        }

        .box {
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            padding: 50px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            max-width: 80%;
            width: 600px;
            transition: transform 0.3s ease;
            animation: fadeIn 1s ease-out, moveUpDown 3s ease-in-out infinite;
        }

        .box:hover {
            animation-play-state: paused;
            transform: translateY(-8px);
        }

        .box h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .ready {
            background-color: #fff;
            color: #1976d2;
            font-size: 1.2rem;
            padding: 18px 35px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .ready:hover {
            background-color: #1976d2;
            color: white;
            transform: scale(1.05);
        }

        @keyframes moveUpDown {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .unavailable {
            display: none;
            background-color: #f44336;
            color: white;
            font-size: 1.5rem;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
            width: 80%;
            animation: fadeIn 1s ease-out;
        }

        @media (max-width: 1024px) {
            .box {
                display: none;
            }

            .unavailable {
                display: block;
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Are you ready for the experience?</h1>
        <button class="ready" onclick="window.location.href = './boot/boot.html';">Ready</button>
    </div>
    <h1 class="unavailable">Sorry, this Website is Currently Unavailable on Mobile Devices.</h1>
</body>
</html>
