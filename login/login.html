<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            background: black url("bgimg.jpg");
            background-repeat:no-repeat;
            background-attachment:fixed;
            background-position:center;
        }

        .windowsxplogo {
            position: absolute;
            top: 50%;
            left: 35%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
        }

        .user  {
            position: absolute;
            top: 50%;
            right: 20%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            font-family: Tahoma;
        }

        .visitor {
            font-size: 30px;
            color: white;
        }

        .name {
            width: 15rem;
            height: 40px;
            border-radius: 5px;
            border: 1px solid black;
            font-family: Tahoma;
            box-sizing: border-box;
            padding-left: 10px;
        }

        .go {
            position: absolute;
            top: 49%;
            right: -50%;
            width: 40px;
            height: 40px;
            margin: 0;
            padding: 0;
            cursor: pointer;
        }

        .welcome {
            position: absolute;
            top: 50%;
            right: 20%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            font-family: Tahoma;
            color: white;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login">
        <img class="windowsxplogo" src="windowsxplogo.png" />
        <div class="user">
            <p class="visitor">Visitor</p>
            <input type="text" class="name" id="name" placeholder="Your Name">
            <img class="go" src="Go.png" />
        </div>
    </div> 
    <h1 class="welcome"><i>welcome</i></h1>

    <script>
        document.querySelector('.go').addEventListener('click', function() {
            // Show welcome message and hide login form
            document.querySelector('.login').style.display = 'none';
            document.querySelector('.welcome').style.display = 'block';
    
            // Set the name to the user's input
            window.name = document.querySelector('.name').value;
    
            // Redirect after a delay
            setTimeout(() => {
                window.location.href = "https://adharvarun.github.io/Portfolio/desktop/desktop.html";
            }, 1000); // 1 second delay before redirecting
        });
    </script>    
</body>
</html>
